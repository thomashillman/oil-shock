name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck, tests, and build
        run: pnpm ci:preflight

      - name: Replay validation
        run: pnpm replay:validate

      - name: Docs check
        run: pnpm docs:check
