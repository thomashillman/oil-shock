name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck, tests, and build
        run: pnpm ci:preflight

      - name: Replay validation
        run: pnpm replay:validate

      - name: Docs check
        run: pnpm docs:check

  deploy-worker:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations (remote)
        run: corepack pnpm wrangler d1 migrations apply energy_dislocation --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Assert config_thresholds row count
        run: |
          COUNT=$(corepack pnpm wrangler d1 execute energy_dislocation --remote --command "SELECT COUNT(*) as c FROM config_thresholds" --json | jq '.[0].results[0].c')
          echo "config_thresholds rows: $COUNT"
          if [ "$COUNT" -lt 20 ]; then
            echo "ERROR: Expected at least 20 rows in config_thresholds, got $COUNT"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker (preview)
        id: deploy_preview
        run: |
          set -o pipefail
          corepack pnpm --filter @oil-shock/worker run deploy:preview 2>&1 | tee preview-deploy.log
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' preview-deploy.log | tail -n1 || true)
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Resolved preview URL: $URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Shape guard: if /api/state already has a snapshot, it must use the new
      # subscore keys. A hit with old keys (physical/recognition/transmission)
      # means the app/worker contract has drifted and prod deploy must block.
      # Missing snapshot (404) is fine — shape only checked when data exists.
      - name: Smoke-check preview /api/state subscore shape
        if: steps.deploy_preview.outputs.preview_url != ''
        run: |
          URL="${{ steps.deploy_preview.outputs.preview_url }}"
          echo "Probing $URL/api/state"
          HTTP_STATUS=$(curl -s -o /tmp/state.json -w '%{http_code}' "$URL/api/state" || echo "000")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "404" ]; then
            echo "No snapshot yet — skipping shape check."
            exit 0
          fi
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: unexpected HTTP $HTTP_STATUS from /api/state"
            cat /tmp/state.json || true
            exit 1
          fi
          cat /tmp/state.json | jq -e '
            (.subscores | has("physicalStress") and has("priceSignal") and has("marketResponse"))
            and (.sourceFreshness | has("physicalStress") and has("priceSignal") and has("marketResponse"))
          ' >/dev/null || {
            echo "ERROR: /api/state subscore/freshness shape drift detected"
            cat /tmp/state.json
            exit 1
          }
          echo "Shape OK."

      - name: Deploy worker (production)
        run: corepack pnpm --filter @oil-shock/worker run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
